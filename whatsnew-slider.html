<div class="slider-container">
    <div class="slider-header">
        <h2 class="slider-heading">What's New</h2>
        <div class="toggle-container">
            <input type="radio" id="new-today" name="new-toggle" checked>
            <label for="new-today" class="toggle-label">Today</label>

            <input type="radio" id="new-this-week" name="new-toggle">
            <label for="new-this-week" class="toggle-label">This Week</label>

            <div class="toggle-slider"></div>
        </div>
    </div>
    <div class="slider" id="new-slider">
        <!-- New movies and TV series will be dynamically inserted here -->
    </div>
</div>
