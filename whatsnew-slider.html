<div class="slider-container">
    <div class="slider-header">
        <h2 class="slider-heading">What's New</h2>
        <div class="toggle-container">
            <input type="radio" id="new-movies" name="new-toggle" checked>
            <label for="new-movies" class="toggle-label">Movies</label>

            <input type="radio" id="new-series" name="new-toggle">
            <label for="new-series" class="toggle-label">Series</label>

            <div class="toggle-slider"></div>
        </div>
    </div>
    <div class="slider" id="new-slider">
        <!-- New movies and TV series will be dynamically inserted here -->
    </div>
</div>
