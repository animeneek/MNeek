<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Details</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
</head>
<body>
    <div id="header-container"></div> <!-- Placeholder for header -->
    <div id="menu-container"></div> <!-- Placeholder for menu -->

    <div class="movie-detail-container">
        <div class="movie-poster">
            <img id="movie-poster" src="" alt="Movie Poster">
        </div>
        <div class="movie-info">
            <h1 id="movie-title"></h1>
            <div class="movie-details">
                <span id="movie-certificate" class="certificate"></span>
                <span id="movie-year"></span>
                <span>•</span>
                <span id="movie-duration"></span>
            </div>
            <p id="movie-description"></p>
        </div>
    </div>

    <script>
        // Load header and menu
        function loadComponent(id, file) {
            fetch(file)
                .then(response => response.text())
                .then(data => document.getElementById(id).innerHTML = data);
        }
        
        loadComponent("header-container", "header.html");
        loadComponent("menu-container", "menu.html");

        // Fetch movie details dynamically
        function getMovieDetails() {
            const urlParams = new URLSearchParams(window.location.search);
            const movieId = urlParams.get('id');
            
            if (movieId) {
                fetch(`https://api.example.com/movies/${movieId}`)
                    .then(response => response.json())
                    .then(data => {
                        document.getElementById("movie-title").innerText = data.title;
                        document.getElementById("movie-poster").src = data.poster;
                        document.getElementById("movie-certificate").innerText = data.certificate;
                        document.getElementById("movie-year").innerText = data.year;
                        document.getElementById("movie-duration").innerText = data.duration;
                        document.getElementById("movie-description").innerText = data.description;
                    })
                    .catch(error => console.error("Error fetching movie data:", error));
            }
        }

        getMovieDetails();
    </script>
</body>
</html>
