<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Details</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
</head>
<body>

    <!-- Header and Menu (Added) -->
    <header>
        <img src="assets/logo.png" alt="MNeek Logo">
    </header>

    <nav class="menu">
        <ul class="menu-items">
            <li><a href="index.html"><i class="fas fa-home menu-icon"></i> <span class="menu-text">Home</span></a></li>
            <li><a href="movies.html"><i class="fas fa-film menu-icon"></i> <span class="menu-text">Movies</span></a></li>
            <li><a href="series.html"><i class="fas fa-tv menu-icon"></i> <span class="menu-text">TV Series</span></a></li>
            <li><a href="livetv.html"><i class="fas fa-satellite-dish menu-icon"></i> <span class="menu-text">Live TV</span></a></li>
        </ul>
    </nav>
    
    <div class="movie-detail-bg">
        <div class="movie-detail-container">
            <div class="movie-poster">
                <img id="movie-poster" src="" alt="Movie Poster">
            </div>
            <div class="movie-info">
                <h1 id="movie-title">Loading...</h1>
                <div class="movie-details">
                    <span id="movie-rating" class="certificate">PG-13</span>
                    <span id="movie-year">2024</span> • 
                    <span id="movie-duration">120 min</span>
                </div>
                <p id="movie-description">Movie description will appear here...</p>
                <div class="source-buttons">
                    <button id="source1-button">Source 1</button>
                    <button id="source2-button">Source 2</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const urlParams = new URLSearchParams(window.location.search);
            const movieId = urlParams.get("id");

            if (movieId) {
                document.getElementById("movie-title").innerText = "Movie " + movieId;
                document.getElementById("movie-description").innerText = "This is the description for movie " + movieId;
                document.getElementById("movie-poster").src = "assets/movie_" + movieId + ".jpg";
            }
        });
    </script>

</body>
</html>
