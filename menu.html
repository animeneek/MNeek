<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="menu">
        <ul class="menu-items">
            <li><a href="index.html" id="icon-home">Home</a></li>
            <li><a href="movies.html" id="icon-movies">Movies</a></li>
            <li><a href="series.html" id="icon-tvseries">TV Series</a></li>
            <li><a href="live.html" id="icon-livetv">Live TV</a></li>
        </ul>
        <div class="search-container">
            <input type="text" id="menu-search-bar" placeholder="Search for movies or series...">
            <i class="fa fa-search" id="menu-search-icon"></i>
        </div>
    </div>
    <script>
        // Trigger search on clicking the magnifying glass icon
        document.getElementById('menu-search-icon').addEventListener('click', function() {
            const query = document.getElementById('menu-search-bar').value;
            if (query) {
                window.location.href = `search.html?query=${encodeURIComponent(query)}`;
            }
        });

        // Trigger search on pressing Enter in the search box
        document.getElementById('menu-search-bar').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const query = document.getElementById('menu-search-bar').value;
                if (query) {
                    window.location.href = `search.html?query=${encodeURIComponent(query)}`;
                }
            }
        });
    </script>
</body>
</html>
