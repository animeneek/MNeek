<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results - Movie Neek</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="header-container"></div>
    <div id="menu-container"></div>
    <div class="container">
        <div id="search-results" class="search-results"></div>
        <div id="pagination" class="pagination"></div>
    </div>
    <script src="search.js"></script>
    <script>
        // Load header and menu
        fetch('header.html').then(response => response.text()).then(data => document.getElementById('header-container').innerHTML = data);
        fetch('menu.html').then(response => response.text()).then(data => document.getElementById('menu-container').innerHTML = data);

        // Get search query from URL
        const urlParams = new URLSearchParams(window.location.search);
        const query = urlParams.get('query');
        if (query) {
            searchTMDB(query, 1);
        }
    </script>
</body>
</html>
